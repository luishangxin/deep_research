# 目标
开发一个类似gemini deep research或者openai deep research的ai agent。用于医学领域的研究。
用户提出各种问题，ai agent需要从医学数据库中搜索相关文献，然后进行分析，最后给出答案。

# 技术栈
1. 使用uv进行pyhton环境管理
2. 基于python，使用LangGraph构建一个Agentic RAG 系统
3. 向量数据库使用SQLite
4. 搜索使用elasticsearch


# agent任务步骤
1. 意图澄清，宏观策略规划与动态任务分解
在耗费大量算力启动正式的深度网络检索之前，系统必须彻底消除用户输入中的语义歧义，确保
计算资源不会被浪费在错误或无价值的研究方向上。当用户通过接口或应用提交一个往往缺乏关
键约束的宽泛查询时，需要执行意图侦测与预处理 
agent的domain主要在医学领域，如果是其他领域，使用llm本身直接回答

设计好prompt：
    - 基于用户的query，理解用户的问题，提取出关键词。如果关键词类似biomaker，drug之类，需要扩展其别名以便搜索。
    - 如果用户的提问过于宽泛，需要进行拆分。
    - 如果用户的提问过于狭隘，需要进行扩展， 给出3个备选。
    - 扩展的问题需要有逻辑联系。

将高维度的宏观问题拆解为多个正交的子问题（Sub-questions
）或并行的研究路径。
假设用户要求撰写一份关于“新型 GLP-1 药物对全球医疗供应链的长期经济影响”的报告，代理系统不会简单地将这句话作为一个整体丢给搜索引擎。相反，它会自动将
其逻辑树拆解为“GLP-1 的临床疗效与用药周期数据”
、
“全球冷链物流当前容量与扩张成本”
、
“欧美及亚太地区的区域定价策略对比”等多个互相独立但又逻辑互补的并行子任务。
系统会为每个被识别出的子任务在内存中实例化一个独立的“子代理（Subagent）”线程，这些子代
理能够在系统的并发控制限制内，同时触发数次独立的检索查询，遵循“先广度后深度”的启发式搜索原则


2. Agentic RAG步骤
Agentic RAG 的工作流通常是一个动态的“思考-行动-观察”循环（类似于 ReAct 框架）。以下是其详细的步骤分解：
   1）搜索文献：

为了提高召回准确率，内置实现采用了 **Hybrid Search (混合搜索)** 策略，结合了语义理解和关键词匹配的优势。

*   **算法流程**:
    1.  **Vector Search (语义层)**:
        *   使用 `sqlite-vec` 扩展。
        *   计算 Query Embedding 与 Chunk Embedding 之间的 **Cosine Distance**。
        *   **评分**: `VectorScore = 1 - CosineDistance`。
    2.  **Keyword Search (词法层)**:
        *   使用 SQLite `FTS5` 模块。
        *   构建查询: 将输入拆分为 Token，使用 `AND` 连接 (e.g., `"foo" AND "bar"`)。
        *   计算 **BM25 Rank** (数值越小越好)。
        *   **评分**: `TextScore = 1 / (1 + BM25Rank)` (归一化到 0-1 区间)。
    3.  **Result Merging (融合层)**:
        *   将两路结果按 `id` 对齐。
        *   **最终评分**: `FinalScore = (VectorWeight * VectorScore) + (TextWeight * TextScore)`。
        *   默认权重通常配置为平衡模式，确保既能捕捉“意图相似”也能捕捉“专有名词匹配”。
    4.  **Result Deduplication (去重层)**:
        *   使用文档的 `pmid` 去重，确保每个文档只出现一次。
        *   可以根据需要添加 **Dedup Boost** (如，对热门文档增加权重)。
    5.  **Result Filtering (过滤层)**:
        *   可以根据需要添加 **Filter Boost** (如，文章的pubdate)。

    2） 评估与自我反思
 通过llm对搜索的top200进行跟深入的与用户提问的关联性分析，会对其检索到的结果进行评估：这些信息能回答当前的子问题吗？
    - 文档内容聚焦用户的关注点
    - 文档内容与用户提问的关联
    - 文档内容的权威性
自我纠错：如果检索到的信息不充分或有误，Agent 会修改其检索关键词，换一个工具，或者重新规划查询路径，发起第二轮甚至第三轮检索。

    3） 当 Agent 判定已经收集到了所有必要且准确的上下文后，它会退出检索循环。系统会将所有经过验证的信息片段汇总，交由大语言模型进行最终的逻辑推理和文本生成，从而给出一个准确、全面且有深度的回答。
    - 需要添加引用

5. 研究报告总结
   基于第4步的输出进行深入的分析，最后给出报告